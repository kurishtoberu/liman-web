    <rect x="146" y="470" width="14" height="102" rx="6" fill="#7b5b3a"/>
    <ellipse cx="1050" cy="455" rx="112" ry="150" fill="url(#tree)" opacity=".78"/>
    <rect x="1044" y="454" width="14" height="115" rx="6" fill="#7b5b3a"/>
  </g>

