<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Modern tropical house illustration</title>
  <desc id="desc">A modern two-storey tropical home with carport, wide glass facade, and trees.</desc>
  <defs>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d9eef5" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#8ea9b7" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#2d3a42" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" x2="1">
      <stop offset="0" stop-color="#8a6a4c"/>
      <stop offset="1" stop-color="#4d3427"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#24333c" flood-opacity="0.28"/>
    </filter>
    <radialGradient id="tree" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#81a96e"/>
      <stop offset="1" stop-color="#2d6745"/>
    </radialGradient>
  </defs>

  <g opacity="0.95">
